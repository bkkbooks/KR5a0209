front:
  text: 東廚司命燈儀
  hash: sha256:d131b34eee935df3fa91ccc121ff09c9d622b809cf676e618b16d8b0b5b5104e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0209_HFL_000-001a, image: hfl/0083/0083-156.png}
body:
  text: 法事如式以今焚香然燈供養本音東廚司命竈君五方五帝竈君五帝竈君夫人天廚靈竈地廚神竈三十六位竈君新竈舊竈神君炊淘神母運水將軍竈中禁忌一切威靈仗此眞香普同供養伏聞天爲百神之君禍淫福善竈乃一家之主紏繆繩愆眷職掌之非輕宜敬心之是重爰兹榖旦特展芹誠桂漿未注於金樽蘭炷先焚於寳鼎庶臻盻蠁克遂感通以今醮官某人逺庖鼎剏曲突咸新慮犯神司敬伸安謝伏願愚衷上達聖意潜孚瞻之在前孰覩尊崇之禮祭之如在當嚴勤懇之誠旣矜請命之辭取効采芹之薦法衆皈依虔誠讃詠舉聖號焚香然燈供養本音東廚司命竈君東方甲乙青帝竈君竈家一切禁忌之神伏聞司命名尊奉上帝差除之㫖竈神職重秉下民倚伏之權變化尤多言辭難盡在天爲七元之使者遞日奏萬事於宸庭一竈各立一名五方或稱五帝群分部屬迭主隂陽雖善善惡惡均在修爲然是是非非必公紀録以今醮官某人僣邀聖駕祗薦香醪伏願見所見聞所聞必言人過筆則筆削則削廣沛天恩稽首歸依虔誠讃詠蒼靈分炁青帝尊神上承帝命下察人倫言功録過賞善奏名日日紀筆時時無停敬則降善妄則降迍傾心首謝願賜安寧焚香然燈供養本音東廚司命竈君南方丙丁赤帝竈君竈家一切禁忌神衆伏聞記名所祀之六神實尊乎竈人莫不營於三膳亦係乎天然思平日所爲未必今人皆是以今醮官某人縈纏世俗養育愛縁靖言甑㸑以釜灊毎待水烹而火飪燔炙致腥膻之衝突炊淘將米榖以抛違拖刀拽斧而豈識重輕𤑔草燔柴則寧無穢觸鱗毛悮𤑔糞草故投酣酒髙聲牽神引呪對竈庭而祼𥘵向廚廨以諠呼殆難以蔽於一言不可勝誅之萬罪今則焚香奠醑酌水獻花兢兢陳自訟之辭懇懇覬非常之福但願致富累世祀不負於隂子方母令獲罪上天媚徒勞於王孫賈稽首歸依虔誠讃詠丹靈眞炁赤帝尊神位居离位職守竈庭能垂福慶善遣災迍束縛九醜焚滅妖精逆吾者死敬吾者生吾有此令兆庶宜遵焚香然燈供養本音東廚司命竈君西方庚辛白帝竈君竈家一切禁忌之神伏聞夏月祭先肺備詳吕令之辭丹砂化黄金具述漢書之志家人有竈人盍謹祠蓋天曹納所奏之言況人世積悮爲之咎自老及㓜而匪一從微至著以何言以今醮官某人逯逯塵寰區區火宅不識忌諱無怪乎粉態脂容自取顚隮常懼乎焦頭爛額旣沐洪恩而赦宥敢忘微禮以歸崇掃蕩群兇嚮用五福有護持之神物無凌爍之精邪行行温魔過我門而不入我室稜稜惡黨聞其語而未見其人絶甑鳴釜呌之災杜狗媚狐趨之怪稽首歸依虔誠讃詠皓靈大聖白帝尊神受符上命掌握群靈職司凡世上侍九清位分兊舍化育舍生攺惡爲善赦罪留恩吹飄萬禍善降玄風焚香然燈供養本音東廚司命竈君北方壬癸黒帝竈君竈家一切禁忌神衆伏聞民以食爲天無竈何從而烹飪竈乃天之吏專司禍福以紀功是仗玄科敬伸安奉以今醮官某人恐家人之踖踖積大過之多多片善勿爲一言難盡旣自迴光返照必能轉禍爲祥伏願驅掃不祥俾常臻於吉慶遣除兇怪庶茂衍於椿期稽首歸依虔誠讃詠壬癸之位玄老尊神天靈大聖地靈將軍俱侍左右聽令而行身長千丈手託乾坤江海爲宅制禦火精聞吾神呪永保清寧焚香然燈供養本音東廚司命竈君中宮戊巳黄帝竈君竈家一切禁忌神衆伏聞職在人間謂親民而最切告膺天上奉帝命之榮除曰司命而命掌非輕稱府君而君銜實重職司廚内掌握居中以今醮官某人居覆載之間沐照臨之下不知不識何慮何辭醉酣祼體以輕狂語話牽神而引呪腥臊熏觸穢手進薪習爲朝夕之常隂有神明之録功無毫髮過若丘山伏願百神擁護萬善資扶降眞炁於五方蕩除妖厭扇祥風於比屋化作恩波稽首歸依虔誠讃詠皇靈冀老戊已帝王居其中位緫領八方提攝萬象罔越紀綱賞善罰惡賜福非常若有妖孽入地消亡保安家舍永殄災殃諷經宣䟽回向東廚司命燈儀終
